<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
    <rect width="1600" height="1000" fill="#ffffff"/>
    <rect x="2" y="2" width="1596" height="996" fill="none" stroke="#000000" stroke-width="3"/>
    <rect x="10" y="10" width="1580" height="980" fill="none" stroke="#000000" stroke-width="1"/>
    <text x="80" y="90" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="22" font-weight="bold" letter-spacing="6" fill="#000000">&#9679; TUNNELMIND</text>
    <text x="80" y="190" font-family="'ChicagoFLF', Geneva, 'Helvetica Neue', sans-serif" font-size="58" fill="#000000">One query. Four lenses.</text>
    <text x="80" y="258" font-family="'ChicagoFLF', Geneva, 'Helvetica Neue', sans-serif" font-size="58" fill="#000000">One signed verdict.</text>

    <path d="M 380 550 C 570 550, 480 400, 705 400" stroke="#000000" stroke-width="2" fill="none"/><path d="M 895 400 C 1100 400, 1020 550, 1190 550" stroke="#000000" stroke-width="2" fill="none"/><path d="M 380 550 C 570 550, 480 500, 705 500" stroke="#000000" stroke-width="2" fill="none"/><path d="M 895 500 C 1100 500, 1020 550, 1190 550" stroke="#000000" stroke-width="2" fill="none"/><path d="M 380 550 C 570 550, 480 600, 705 600" stroke="#000000" stroke-width="2" fill="none"/><path d="M 895 600 C 1100 600, 1020 550, 1190 550" stroke="#000000" stroke-width="2" fill="none"/><path d="M 380 550 C 570 550, 480 700, 705 700" stroke="#000000" stroke-width="2" fill="none"/><path d="M 895 700 C 1100 700, 1020 550, 1190 550" stroke="#000000" stroke-width="2" fill="none"/>

    <!-- query node -->
    <g>
      <rect x="120" y="510" width="260" height="80" rx="0" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
      <text x="250" y="545" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="19" fill="#000000">your agent asks</text>
      <text x="250" y="572" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="20" fill="#000000">verify(destination)</text>
    </g>

    <g>
      <rect x="705" y="374" width="190" height="52" rx="0" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
      <circle cx="730" cy="400" r="6" fill="#000000"/>
      <text x="748" y="405" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="20" fill="#000000">Scry</text>
    </g><g>
      <rect x="705" y="474" width="190" height="52" rx="0" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
      <circle cx="730" cy="500" r="6" fill="#000000"/>
      <text x="748" y="505" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="20" fill="#000000">Sigil</text>
    </g><g>
      <rect x="705" y="574" width="190" height="52" rx="0" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
      <circle cx="730" cy="600" r="6" fill="#000000"/>
      <text x="748" y="605" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="20" fill="#000000">Tracker</text>
    </g><g>
      <rect x="705" y="674" width="190" height="52" rx="0" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
      <circle cx="730" cy="700" r="6" fill="#000000"/>
      <text x="748" y="705" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="20" fill="#000000">GhostRoute</text>
    </g>

    <!-- verdict node -->
    <g>
      <rect x="1190" y="495" width="260" height="110" rx="0" fill="#000000"/>
      <text x="1320" y="532" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="16" fill="#ffffff">cross-lens verdict</text>
      <text x="1320" y="572" text-anchor="middle" font-family="'ChicagoFLF', Geneva, 'Helvetica Neue', sans-serif" font-size="42" fill="#ffffff">ALLOW</text>
    </g>
    <text x="1210" y="670" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="15" fill="#000000">+ Ed25519 receipt &#183; attestation tier:</text>
    <text x="1210" y="700" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="17" fill="#000000">  self-asserted</text><text x="1210" y="730" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="17" fill="#000000">▸ software</text><text x="1210" y="760" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="17" fill="#000000">  tee-tpm</text><text x="1210" y="790" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="17" fill="#000000">  silicon-root</text>

    <text x="80" y="944" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="20" letter-spacing="3" fill="#000000">tunnelmind.ai</text>
    <text x="1520" y="944" text-anchor="end" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="18" fill="#000000">Trust attestation layer for the agentic internet</text>
  </svg>