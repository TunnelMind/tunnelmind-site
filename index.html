      <header>
        <h1>TunnelMind — trust attestation for the agentic internet</h1>
        <p>
          The web is filling up with traffic no human ever typed. TunnelMind
          watches the hostile slice of it — a distributed fleet of attested
          sensors plus public feeds, every observation Ed25519-signed at the
          source so the data can prove where it came from.
        </p>
      </header>

      <section>
        <h2>One signed corpus, four lenses</h2>
        <ul>
          <li>
            <strong>Scry</strong> — signed observations of hostile network
            actors. IPs, ASNs, behaviors, threat-feed overlap, actor
            classification. <a href="https://api.tunnelmind.ai">api.tunnelmind.ai</a>
          </li>
          <li>
            <strong>Sigil</strong> — programmatic-advertising supply-graph
            trust layer. Publishers, SSPs, DSPs, seats, OpenRTB SupplyChain,
            entity trust scoring. <a href="https://data.tunnelmind.ai">data.tunnelmind.ai</a>
          </li>
          <li>
            <strong>Tracker</strong> — the demand-side graph of who is
            watching whom on the open web; recurring SDK fingerprints and
            tracker-operator entities.
          </li>
          <li>
            <strong>GhostRoute</strong> — routing integrity and sovereignty.
            Origin AS, RPKI route validity, the sovereign jurisdiction a
            service claims versus the one it egresses through, and first-party
            certificate-transparency witnessing.
            <a href="https://data.tunnelmind.ai/v1/ghostroute/check/api.anthropic.com">data.tunnelmind.ai/v1/ghostroute</a>
          </li>
        </ul>
        <p>
          The moat is the join: a fused cross-lens verdict on any entity
          (attack signal × trust signal × tracker signal × routing signal)
          no siloed incumbent can compute.
        </p>
      </section>
