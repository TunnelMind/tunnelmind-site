name: Drift check

# Fails if shared files (supabase.js, TopNav.jsx, tierDetection.js) drift
# between tunnelmind-site and alloy-site (private).
# Requires SIBLING_REPO_TOKEN secret — a PAT with Contents: Read on TunnelMind/alloy-site.

on:
  pull_request:
    paths:
      - 'src/lib/supabase.js'
      - 'src/lib/tierDetection.js'
      - 'src/components/shared/TopNav.jsx'

jobs:
  drift-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out tunnelmind-site (this repo)
        uses: actions/checkout@v4

      - name: Check out alloy-site (sibling, private)
        uses: actions/checkout@v4
        with:
          repository: TunnelMind/alloy-site
          token: ${{ secrets.SIBLING_REPO_TOKEN }}
          path: sibling-alloy-site

      - name: Run drift check
        run: |
          ALLOY_SITE="$GITHUB_WORKSPACE/sibling-alloy-site" \
            bash scripts/sync-shared.sh
